services:
  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: ai-engineering-qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-engineering-app
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      QDRANT_URL: http://qdrant:6333
    env_file:
      - .env
    volumes:
      - .:/app
      - app_venv:/app/.venv
    ports:
      - "8888:8888"
    stdin_open: true
    tty: true

volumes:
  qdrant_storage:
  app_venv:
